# ワークフロー（自動化処理）の名前
name: C++ Release Workflow

# ワークフローを実行するきっかけ（トリガー）
on:
  # masterブランチにpushされたときに実行
  push:
    branches:
      - master

  # Actionsタブから手動で実行できるようにするトリガー
  workflow_dispatch:

# ワークフロー全体で使う環境変数
env:
  # あなたのソリューションファイルのパス
  SOLUTION_FILE_PATH: project/MyDreamGame.sln

  # ビルド構成を Release に設定
  CONFIGURATION: Release

# 実行するジョブ（仕事）の内容
jobs:
  # 'build' という名前のジョブ
  build:
    # Windows Server 2022 の仮想環境で実行する
    runs-on: windows-2022

    # ジョブの具体的な手順（ステップ）
    steps:
      # 1. ソースコードをチェックアウト（仮想環境に持ってくる）
      - name: Checkout
        uses: actions/checkout@v4

      # 2. MSBuildを使えるように準備する
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      # 3. MSBuildを実行してビルドする
      - name: Build
        run: msbuild ${{env.SOLUTION_FILE_PATH}} /p:Platform=x64,Configuration=${{env.CONFIGURATION}}
